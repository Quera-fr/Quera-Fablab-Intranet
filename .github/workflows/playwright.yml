name: Playwright Tests
on:
  push:
    branches: [ main, master, dev, test-unitaires-* ]
  pull_request:
    branches: [ main, master, dev, test-unitaires-* ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: intranet
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Seed database
        run: psql -h localhost -U postgres -d intranet -f seed.sql
        env:
          PGPASSWORD: postgres
      - name: Run Playwright tests
        run: npx playwright test
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: intranet
